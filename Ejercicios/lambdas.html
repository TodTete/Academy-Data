<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lambdas | Ricardo Vallejo</title>

<link rel="stylesheet" href="/config/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Contenedor */
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* Tarjetas */
.galeria img {
    width: 100%;
    border-radius: 15px;
    transition: transform 0.3s ease;
}

/* Efecto hover */
.galeria img:hover {
    transform: scale(1.05);
}

.titulo {
    text-align: center;
    margin-top: 40px;
}

</style>

</head>

<body>

<header>

<h1 class="titulo">
<i class="fa-solid fa-bolt"></i> Lambdas
</h1>

</header>

<section class="galeria">

<img src="/assets/lambda_1.png" alt="Lambda 1">
<img src="/assets/lambda_2.png" alt="Lambda 2">
<img src="/assets/lambda_3.png" alt="Lambda 3">

</section>

<footer style="text-align:center; padding:20px;">
<p>© 2026 Ricardo Vallejo</p>
</footer>

</body>
</html>
